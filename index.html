function makeUrl(url, corsMode, corsProxy) {
  if (corsMode === "builtin") return "https://lucky-hall-7699.windmusic1217.workers.dev/" + url;
  if (corsMode === "custom" && corsProxy) {
    const p = corsProxy.replace(/\/+$/, "");
    return p.includes("?") ? p + encodeURIComponent(url) : p + "/" + url;
  }
  return url;
}
 
async function doFetch(url, opts, corsMode, corsProxy) {
  const primary = makeUrl(url, corsMode, corsProxy);
  try {
    const res = await fetch(primary, opts);
    return res;
  } catch (err) {
 
    throw new Error(corsMode === "direct"
      ? "Failed to fetch — 此供應商可能不支援瀏覽器直連（CORS），請在 API 設定中切換為「內建代理」或「自訂代理」"

  }

  const { provider, apiKey, model, customEndpoint, corsMode, corsProxy } = cfg;
  try {
    let res, data;
    if (provider === "anthropic") {
      res = await doFetch(PROVIDERS.anthropic.endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: "user", content: prompt }] }),
      }, corsMode, corsProxy);
      data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.content[0].text;
    }
    if (provider === "google") {
      const base = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      res = await doFetch(base, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: maxTokens } }) }, corsMode, corsProxy);
      data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.candidates[0].content.parts[0].text;
    }
    const endpoint = provider === "custom" ? customEndpoint : PROVIDERS[provider]?.endpoint;
    if (!endpoint) throw new Error("No endpoint");
    res = await doFetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${apiKey}` },
      body: JSON.stringify({ model, messages: [{ role: "user", content: prompt }], max_tokens: maxTokens }),
    }, corsMode, corsProxy);
    data = await res.json();
    if (data.error) throw new Error(typeof data.error === "string" ? data.error : data.error?.message || JSON.stringify(data.error));
    return data.choices?.[0]?.message?.content || "";
  } catch (e) { throw new Error(`API Error: ${e.message}`); }
}
